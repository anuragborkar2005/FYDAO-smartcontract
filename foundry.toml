
[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.default.optimizer_details]
yul = true
yulDetails = { stackAllocation = true }

[profile.test]
via_ir = true         # ← disable for testing speed + avoid optimizer quirks
optimizer = true
optimizer_runs = 200

[profile.ci]
via_ir = true
optimizer = true
optimizer_runs = 200

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
